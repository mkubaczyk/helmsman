context: team-a

settings:
  kubeContext: "minikube"

namespaces:
  team-a:
    protected: false
    labels:
      team: "team-a"
      env: "staging"

helmRepos:
  ingress-nginx: "https://kubernetes.github.io/ingress-nginx"
  prometheus-community: "https://prometheus-community.github.io/helm-charts"
  podinfo: "https://stefanprodan.github.io/podinfo"

apps:
  # Priority -2: lightweight app — deploys first, fully namespace-scoped
  podinfo-team-a:
    namespace: "team-a"
    enabled: true
    chart: "podinfo/podinfo"
    version: "6.6.0"
    priority: -2
    alwaysUpgrade: true
    set:
      replicaCount: "1"
      ui.message: "team-a staging"

  # Priority -1: ingress layer — deploys after infra
  nginx-team-a:
    namespace: "team-a"
    enabled: true
    chart: "ingress-nginx/ingress-nginx"
    version: "4.6.0"
    priority: -1
    alwaysUpgrade: true
    set:
      controller.ingressClassResource.name: "nginx-team-a"
      controller.ingressClass: "nginx-team-a"
      controller.replicaCount: "1"
      controller.metrics.enabled: "true"

  # Priority 0: observability — deploys last, depends on ingress being ready
  prometheus-team-a:
    namespace: "team-a"
    enabled: true
    chart: "prometheus-community/prometheus"
    version: "25.0.0"
    priority: 0
    alwaysUpgrade: true
    set:
      server.replicaCount: "1"
      server.retention: "6h"
      alertmanager.enabled: "false"
      prometheus-pushgateway.enabled: "false"
      serverFiles."prometheus\.yml".scrape_configs[0].job_name: "nginx-team-a"
